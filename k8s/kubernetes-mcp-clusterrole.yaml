apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-mcp-server-readonly
  labels:
    app.kubernetes.io/name: kubernetes-mcp-server
rules:
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs:
      - /api
      - /api/*
      - /apis
      - /apis/*
      - /healthz
      - /healthz/*
      - /livez
      - /livez/*
      - /openapi
      - /openapi/*
      - /readyz
      - /readyz/*
      - /version
    verbs: ["get"]
