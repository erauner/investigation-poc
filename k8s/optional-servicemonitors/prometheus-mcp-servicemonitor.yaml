apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: prometheus-mcp-server
  namespace: kagent
  labels:
    app.kubernetes.io/name: prometheus-mcp-server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus-mcp-server
  namespaceSelector:
    matchNames:
      - kagent
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
