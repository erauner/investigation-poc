apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-api
  namespace: metrics-smoke
  labels:
    app.kubernetes.io/name: metrics-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metrics-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metrics-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: app
          image: metrics-smoke-app:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-api
  namespace: metrics-smoke
  labels:
    app.kubernetes.io/name: metrics-api
spec:
  selector:
    app.kubernetes.io/name: metrics-api
  ports:
    - name: http
      port: 8080
      targetPort: http
