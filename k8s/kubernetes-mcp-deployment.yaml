apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp-server
  namespace: kagent
  labels:
    app.kubernetes.io/name: kubernetes-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubernetes-mcp-server
    spec:
      serviceAccountName: kubernetes-mcp-server
      containers:
        - name: mcp
          image: ghcr.io/containers/kubernetes-mcp-server:latest
          imagePullPolicy: IfNotPresent
          args:
            - --port=8080
            - --read-only
            - --stateless
            - --disable-multi-cluster
            - --toolsets=core
            - --list-output=yaml
            - --log-level=2
          env:
            - name: OTEL_SERVICE_NAME
              value: kubernetes-mcp-server
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=kubernetes-mcp-server,service.namespace=kagent,mcp_server=kubernetes-mcp-server
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
