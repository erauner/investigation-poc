apiVersion: apps/v1
kind: Deployment
metadata:
  name: kagent-slack-bot
  namespace: kagent
  labels:
    app.kubernetes.io/name: kagent-slack-bot
    app.kubernetes.io/component: integration
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kagent-slack-bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kagent-slack-bot
        app.kubernetes.io/component: integration
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: slack-bot
          image: python:3.12-slim-bookworm
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -eu

              if [ -z "${SLACK_BOT_TOKEN:-}" ] || [ "${SLACK_BOT_TOKEN}" = "xoxb-replace-me" ]; then
                echo "SLACK_BOT_TOKEN is not configured; sleeping."
                exec sleep infinity
              fi

              if [ -z "${SLACK_APP_TOKEN:-}" ] || [ "${SLACK_APP_TOKEN}" = "xapp-replace-me" ]; then
                echo "SLACK_APP_TOKEN is not configured; sleeping."
                exec sleep infinity
              fi

              VENV_PATH=/tmp/kagent-slack-bot-venv
              python -m venv "${VENV_PATH}"
              . "${VENV_PATH}/bin/activate"
              pip install --no-cache-dir --upgrade pip
              pip install --no-cache-dir \
                'a2a-sdk>=0.3.0' \
                'aiohttp>=3.11.18' \
                'httpx>=0.28.1' \
                'httpx-sse>=0.4.0' \
                'pydantic>=2.11.4' \
                'slack-bolt>=1.23.0'
              exec python /app/main.py
          env:
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack-bot-credentials
                  key: SLACK_BOT_TOKEN
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack-bot-credentials
                  key: SLACK_APP_TOKEN
            - name: SLACK_USER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack-bot-credentials
                  key: SLACK_USER_TOKEN
                  optional: true
            - name: KAGENT_A2A_URL
              value: http://kagent-controller.kagent:8083/api/a2a/kagent/slack-a2a-agent/
            - name: KAGENT_SHADOW_A2A_URL
              value: http://kagent-controller.kagent:8083/api/a2a/kagent/incident-triage-shadow/
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app
          configMap:
            name: kagent-slack-bot
            defaultMode: 0444
        - name: tmp
          emptyDir: {}
