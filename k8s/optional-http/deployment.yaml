apiVersion: apps/v1
kind: Deployment
metadata:
  name: investigation-service
  namespace: kagent
  labels:
    app.kubernetes.io/name: investigation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: investigation-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: investigation-service
    spec:
      serviceAccountName: investigation-service
      containers:
        - name: api
          image: ghcr.io/erauner/investigation-poc:latest
          imagePullPolicy: Always
          env:
            - name: GUIDELINES_PATH
              value: /etc/investigation-service/guidelines.yaml
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: investigation-service-config
          volumeMounts:
            - name: guidelines
              mountPath: /etc/investigation-service
              readOnly: true
            - name: cluster-registry
              mountPath: /etc/investigation
              readOnly: true
            - name: multicluster-kubeconfig
              mountPath: /etc/investigation/kubeconfig
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: guidelines
          configMap:
            name: investigation-service-guidelines
        - name: cluster-registry
          configMap:
            name: investigation-cluster-registry
        - name: multicluster-kubeconfig
          secret:
            secretName: investigation-multicluster-kubeconfig
            optional: true
