apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki-mcp-server
  namespace: kagent
  labels:
    app.kubernetes.io/name: loki-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki-mcp-server
    spec:
      serviceAccountName: loki-mcp-server
      containers:
        - name: mcp
          image: loki-mcp-server:local
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            - name: LOKI_URL
              valueFrom:
                configMapKeyRef:
                  name: investigation-service-config
                  key: LOKI_URL
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 65532
      securityContext:
        seccompProfile:
          type: RuntimeDefault
