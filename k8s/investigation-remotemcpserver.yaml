apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: investigation-mcp-server
  namespace: kagent
spec:
  description: In-cluster MCP wrapper for investigation-service context collection
  protocol: STREAMABLE_HTTP
  url: http://investigation-mcp-server.kagent:8001/mcp
  timeout: 30s
  sseReadTimeout: 5m
  terminateOnClose: true
