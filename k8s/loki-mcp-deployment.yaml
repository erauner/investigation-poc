apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki-mcp-server
  namespace: kagent
  labels:
    app.kubernetes.io/name: loki-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki-mcp-server
    spec:
      serviceAccountName: loki-mcp-server
      initContainers:
        - name: build-binary
          image: golang:1.24-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              apk add --no-cache git ca-certificates
              git clone https://github.com/grafana/loki-mcp.git /src
              cd /src
              git checkout c8148563dd268126314e008fc1dc71930b6c7b61
              CGO_ENABLED=0 GOOS=linux go build -o /work/loki-mcp-server ./cmd/server
              chmod 0555 /work/loki-mcp-server
          volumeMounts:
            - name: app
              mountPath: /work
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      containers:
        - name: mcp
          image: alpine:3.21
          imagePullPolicy: IfNotPresent
          command:
            - /opt/mcp/loki-mcp-server
          env:
            - name: PORT
              value: "8080"
            - name: LOKI_URL
              valueFrom:
                configMapKeyRef:
                  name: investigation-service-config
                  key: LOKI_URL
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: http
          livenessProbe:
            tcpSocket:
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: app
              mountPath: /opt/mcp
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 65532
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: app
          emptyDir: {}
