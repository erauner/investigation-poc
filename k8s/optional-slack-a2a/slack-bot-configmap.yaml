apiVersion: v1
kind: ConfigMap
metadata:
  name: kagent-slack-bot
  namespace: kagent
data:
  main.py: |
    import logging
    import os

    from slack_bolt import App
    from slack_bolt.adapter.socket_mode import SocketModeHandler

    from handlers import register_handlers


    logging.basicConfig(level=os.environ.get("LOG_LEVEL", "INFO"))
    app = App(token=os.environ.get("SLACK_BOT_TOKEN"))


    def error_handler(error, body, logger):
        logging.error("Slack bot error: %s body=%s", error, body)


    app.error(error_handler)
    register_handlers(app)


    def main():
        logging.info("Starting kagent Slack bot")
        SocketModeHandler(app, os.environ.get("SLACK_APP_TOKEN")).start()


    if __name__ == "__main__":
        main()
  handlers.py: |
    import asyncio
    import os
    import re
    import uuid
    from logging import Logger

    import httpx
    from a2a.client import A2AClient
    from a2a.types import Message, MessageSendParams, SendMessageRequest, TextPart
    from slack_bolt import Ack, App, Say
    from slack_sdk import WebClient
    from slack_sdk.errors import SlackApiError


    THREAD_CONTEXTS = {}
    SHOW_USAGE = os.environ.get("SLACK_SHOW_USAGE", "").lower() == "true"
    THREAD_FETCH_LIMIT = 20
    THREAD_TRANSCRIPT_RENDER_LIMIT = 10
    ENTRYPOINT_PREFIX = "[INVESTIGATION_ENTRYPOINT]="
    GENERIC_ENTRYPOINT = "[INVESTIGATION_ENTRYPOINT]=generic"
    ALERT_ENTRYPOINT = "[INVESTIGATION_ENTRYPOINT]=alert"
    OPERATOR_TARGET_PREFIXES = ("Backend/", "Frontend/", "Cluster/")
    PLACEHOLDER_TEXTS = {
        "Reviewing the thread...",
        "Checking recent signals...",
        "Checking the cluster...",
        "Preparing the update...",
        "Working on it...",
    }


    def _extract_text_from_parts(parts) -> str:
        texts = []
        for part in parts or []:
            kind = getattr(part, "kind", None)
            if kind == "text":
                value = getattr(part, "text", "")
                if value:
                    texts.append(value)
                continue

            if kind != "data":
                continue

            data = getattr(part, "data", None) or {}
            name = data.get("name")
            args = data.get("args", {}) or {}

            if name == "adk_request_confirmation":
                hint = ((args.get("toolConfirmation") or {}).get("hint") or "").strip()
                if hint:
                    texts.append(f"Confirmation required: {hint}")
                    continue

            if name == "ask_user":
                questions = args.get("questions") or []
                for question in questions:
                    prompt = (question.get("question") or "").strip()
                    if prompt:
                        texts.append(f"Input required: {prompt}")

        return "\n".join(texts).strip()


    async def invoke_a2a_agent(agent_url: str, user_input: str, logger: Logger, context_id: str | None = None):
        async with httpx.AsyncClient(timeout=600.0) as httpx_client:
            client = A2AClient(
                url=agent_url,
                httpx_client=httpx_client,
            )
            text_part = TextPart(text=user_input)
            message = Message(
                role="user",
                parts=[text_part],
                message_id=str(uuid.uuid4()),
                context_id=context_id,
            )
            payload = MessageSendParams(
                message=message,
                message_id=str(uuid.uuid4()),
            )

            logger.info("Invoking kagent A2A agent at %s", agent_url)
            response = await client.send_message(
                SendMessageRequest(id=str(uuid.uuid4()), params=payload)
            )

        text = ""
        usage = ""

        if response.root and response.root.result:
            task = response.root.result
            if hasattr(task, "artifacts") and task.artifacts:
                for artifact in task.artifacts:
                    if hasattr(artifact, "parts") and artifact.parts:
                        for part in artifact.parts:
                            if hasattr(part, "root") and hasattr(part.root, "text"):
                                text += part.root.text
                usage = extract_usage_info(task)
            elif hasattr(task, "status") and getattr(task.status, "message", None):
                message = task.status.message
                text = _extract_text_from_parts(getattr(message, "parts", None))
            else:
                text = "No artifacts found in the response"
        else:
            text = "No response from the agent"

        next_context_id = None
        if response.root and response.root.result:
            next_context_id = getattr(response.root.result, "context_id", None) or getattr(response.root.result, "contextId", None)

        return text.strip(), usage, next_context_id


    def run_a2a(agent_url: str, user_input: str, logger: Logger, context_id: str | None = None):
        return asyncio.run(invoke_a2a_agent(agent_url, user_input, logger, context_id))


    def extract_usage_info(task) -> str:
        try:
            metadata = getattr(task, "metadata", None) or {}
            usage_meta = metadata.get("adk_usage_metadata") or metadata.get("kagent_usage_metadata")
            if not usage_meta:
                return ""
            prompt_tokens = usage_meta.get("promptTokenCount", 0)
            response_tokens = usage_meta.get("candidatesTokenCount", 0)
            total_tokens = usage_meta.get("totalTokenCount", 0)
            return (
                f"Token usage: prompt={prompt_tokens:,} "
                f"response={response_tokens:,} total={total_tokens:,}"
            )
        except Exception:
            return ""


    def placeholder_text_for_prompt(text: str) -> str:
        lowered = (text or "").lower()
        if "summary" in lowered or "summarize" in lowered:
            return "Reviewing the thread..."
        if "event" in lowered or "log" in lowered:
            return "Checking recent signals..."
        if "namespace" in lowered or "pod" in lowered or "deployment" in lowered or "cluster" in lowered:
            return "Checking the cluster..."
        if "slack" in lowered or "send" in lowered or "post" in lowered:
            return "Preparing the update..."
        return "Working on it..."


    def _extract_explicit_alertname(text: str) -> str | None:
        patterns = [
            re.compile(r"\balertname\s*[:=]\s*([^\s,.;]+)", re.IGNORECASE),
            re.compile(r"^\s*Investigate\s+alert\s+([^\s,.;:]+)", re.IGNORECASE),
        ]

        for pattern in patterns:
            match = pattern.search(text or "")
            if not match:
                continue
            candidate = (match.group(1) or "").strip()
            if not candidate:
                continue
            if "/" in candidate:
                return None
            if any(candidate.startswith(prefix) for prefix in OPERATOR_TARGET_PREFIXES):
                return None
            return candidate

        return None


    def _run_slack_command(
        client: WebClient,
        ack: Ack,
        command,
        logger: Logger,
        context,
        agent_url: str | None,
        usage_hint: str,
    ):
        ack()

        user_id = context["user_id"]
        channel_id = context["channel_id"]
        text = (command.get("text") or "").strip()

        if not text:
            client.chat_postEphemeral(
                channel=channel_id,
                user=user_id,
                text=usage_hint,
            )
            return

        client.chat_postEphemeral(
            channel=channel_id,
            user=user_id,
            text=placeholder_text_for_prompt(text),
        )

        if not agent_url:
            client.chat_postMessage(
                channel=channel_id,
                text="The target A2A URL is not configured for this Slack command.",
            )
            return

        try:
            prompt_text = _build_prefixed_prompt(
                text,
                "alert" if _extract_explicit_alertname(text) else "generic",
            )
            response, usage_info, _ = run_a2a(agent_url, prompt_text, logger)
            if not response:
                response = "No response received from the agent."

            blocks = [
                {
                    "type": "context",
                    "elements": [
                        {
                            "type": "mrkdwn",
                            "text": f"*Query:* {text}"
                        }
                    ]
                },
                {
                    "type": "divider"
                },
                {
                    "type": "section",
                    "text": {
                        "type": "mrkdwn",
                        "text": response[:2900]
                    }
                }
            ]

            if usage_info and SHOW_USAGE:
                blocks.extend(
                    [
                        {"type": "divider"},
                        {
                            "type": "context",
                            "elements": [{"type": "mrkdwn", "text": usage_info}],
                        },
                    ]
                )

            client.chat_postMessage(
                channel=channel_id,
                blocks=blocks,
                text=response[:200],
            )
        except Exception as error:
            logger.exception("Failed to invoke kagent from Slack")
            client.chat_postMessage(
                channel=channel_id,
                text=f"Slack command failed: {error}",
            )


    def kind_kagent_command(
        client: WebClient, ack: Ack, command, say: Say, logger: Logger, context
    ):
        agent_url = os.getenv("KAGENT_A2A_URL")
        _run_slack_command(client, ack, command, logger, context, agent_url, "Usage: /kind-kagent <prompt>")


    def kind_shadow_command(
        client: WebClient, ack: Ack, command, say: Say, logger: Logger, context
    ):
        agent_url = os.getenv("KAGENT_SHADOW_A2A_URL")
        _run_slack_command(client, ack, command, logger, context, agent_url, "Usage: /kind-shadow <prompt>")


    def _strip_bot_mentions(text: str) -> str:
        return re.sub(r"<@[A-Z0-9]+>", "", text or "").strip()


    def _thread_key(team_id: str | None, channel_id: str, thread_ts: str) -> str:
        return f"{team_id or 'unknown'}:{channel_id}:{thread_ts}"


    def _normalize_slack_text(text: str) -> str:
        text = _strip_bot_mentions(text or "")
        text = re.sub(r"Token usage:.*$", "", text, flags=re.MULTILINE).strip()
        return text


    def _message_text(message: dict) -> str:
        return _normalize_slack_text(message.get("text") or "")


    def _is_noise_message(text: str) -> bool:
        if not text:
            return True
        if text in PLACEHOLDER_TEXTS:
            return True
        return text.startswith("/kind-kagent ") or text.startswith("/kind-shadow ")


    def _message_key(message: dict) -> str:
        return (
            message.get("ts")
            or message.get("client_msg_id")
            or f"{message.get('subtype', 'message')}:{message.get('user', 'unknown')}:{_message_text(message)[:40]}"
        )


    def _is_current_bot_message(
        message: dict,
        bot_user_id: str | None,
        bot_app_id: str | None = None,
    ) -> bool:
        if bot_user_id and message.get("user") == bot_user_id:
            return True
        if bot_app_id and message.get("app_id") == bot_app_id:
            return True
        return False


    def _speaker_for_message(
        message: dict,
        bot_user_id: str | None,
        bot_app_id: str | None = None,
    ) -> str:
        user_id = message.get("user")
        if _is_current_bot_message(message, bot_user_id, bot_app_id):
            return "assistant"
        if message.get("subtype") == "bot_message":
            return "system"
        if user_id:
            return "user"
        return "system"


    def _classify_thread_entrypoint(
        messages: list[dict],
        bot_user_id: str | None,
        bot_app_id: str | None = None,
    ) -> tuple[str, list[str], set[str]]:
        signal_ids = []
        matched_keys = set()
        alertname_pattern = re.compile(r"\balertname\s*[:=]\s*([^\s,.;]+)", re.IGNORECASE)
        status_pattern = re.compile(r"\bstatus\s*[:=]\s*(firing|resolved)\b", re.IGNORECASE)
        summary_pattern = re.compile(
            r"\b([A-Za-z][A-Za-z0-9_]+)\s+(firing|resolved)\s+for\s+(pod|service|deployment|statefulset|node)/[^\s,.;]+",
            re.IGNORECASE,
        )

        for message in messages:
            text = _message_text(message)
            if _is_noise_message(text):
                continue
            if _is_current_bot_message(message, bot_user_id, bot_app_id):
                continue

            lowered = text.lower()
            matched_here = []

            if alertname_pattern.search(text):
                matched_here.append("alertname_marker")
            if status_pattern.search(text):
                matched_here.append("status_marker")
            if any(marker in text for marker in ("startsAt", "endsAt", "generatorURL")):
                matched_here.append("payload_field_marker")
            if "labels:" in lowered and "annotations:" in lowered:
                matched_here.append("labels_annotations_block_marker")
            if summary_pattern.search(text):
                matched_here.append("structured_summary_marker")

            if not matched_here:
                continue

            matched_keys.add(_message_key(message))
            for signal_id in matched_here:
                if signal_id not in signal_ids:
                    signal_ids.append(signal_id)

        return ("alert" if signal_ids else "generic"), signal_ids, matched_keys


    def _select_thread_messages(
        messages: list[dict],
        bot_user_id: str | None,
        matched_message_keys: set[str] | None = None,
        bot_app_id: str | None = None,
    ) -> list[dict]:
        matched_message_keys = matched_message_keys or set()
        relevant = []
        root_candidate = None

        for index, message in enumerate(messages):
            text = _message_text(message)
            if _is_noise_message(text):
                continue
            if _is_current_bot_message(message, bot_user_id, bot_app_id):
                continue

            entry = {
                "index": index,
                "key": _message_key(message),
                "message": message,
            }
            relevant.append(entry)
            if index == 0:
                root_candidate = entry

        if not relevant:
            return []

        selected = {}
        if root_candidate:
            selected[root_candidate["key"]] = root_candidate

        for entry in relevant:
            if entry["key"] in matched_message_keys:
                selected[entry["key"]] = entry

        for entry in reversed(relevant):
            if len(selected) >= THREAD_TRANSCRIPT_RENDER_LIMIT:
                break
            selected.setdefault(entry["key"], entry)

        ordered = sorted(selected.values(), key=lambda item: item["index"])
        if len(ordered) <= THREAD_TRANSCRIPT_RENDER_LIMIT:
            return [item["message"] for item in ordered]

        if root_candidate and root_candidate["key"] in selected:
            tail = ordered[-(THREAD_TRANSCRIPT_RENDER_LIMIT - 1):]
            kept = [root_candidate]
            for item in tail:
                if item["key"] != root_candidate["key"]:
                    kept.append(item)
            return [item["message"] for item in kept[:THREAD_TRANSCRIPT_RENDER_LIMIT]]

        return [item["message"] for item in ordered[-THREAD_TRANSCRIPT_RENDER_LIMIT:]]


    def _format_thread_transcript(
        messages: list[dict],
        bot_user_id: str | None,
        matched_message_keys: set[str] | None = None,
        bot_app_id: str | None = None,
    ) -> str:
        lines = []
        for message in _select_thread_messages(messages, bot_user_id, matched_message_keys, bot_app_id):
            text = _message_text(message)
            if len(text) > 400:
                text = text[:400].rstrip() + "..."

            speaker = _speaker_for_message(message, bot_user_id, bot_app_id)
            lines.append(f"{speaker}: {text}")

        return "\n".join(lines).strip()


    def _build_prefixed_prompt(
        latest_request: str,
        mode: str,
        transcript: str | None = None,
    ) -> str:
        entrypoint = ALERT_ENTRYPOINT if mode == "alert" else GENERIC_ENTRYPOINT
        lines = [entrypoint, ""]
        if transcript:
            lines.extend(
                [
                    "Slack thread transcript:",
                    transcript,
                    "",
                    "Use the thread transcript as context. Focus on the latest user request and avoid repeating long prior lists unless asked.",
                    "",
                ]
            )
        lines.extend(["Latest user request:", latest_request])
        return "\n".join(lines)


    def build_thread_aware_prompt(
        text: str,
        body: dict,
        logger: Logger,
    ) -> str:
        latest_request = (text or "").strip()
        explicit_alertname = _extract_explicit_alertname(latest_request)
        default_mode = "alert" if explicit_alertname else "generic"
        user_token = os.environ.get("SLACK_USER_TOKEN")
        bot_user_id = body.get("authorizations", [{}])[0].get("user_id")
        bot_app_id = body.get("api_app_id")
        if not user_token:
            logger.info(
                "Slack ingress mode=%s source=latest-request thread_history=disabled",
                default_mode,
            )
            return _build_prefixed_prompt(latest_request, default_mode)

        event = body.get("event", {}) or {}
        channel_id = event.get("channel")
        thread_ts = event.get("thread_ts") or event.get("ts")
        if not channel_id or not thread_ts:
            logger.info(
                "Slack ingress mode=%s source=latest-request thread_history=unavailable",
                default_mode,
            )
            return _build_prefixed_prompt(latest_request, default_mode)

        try:
            history_client = WebClient(token=user_token)
            history = history_client.conversations_replies(
                channel=channel_id,
                ts=thread_ts,
                limit=THREAD_FETCH_LIMIT,
            )
            messages = history.get("messages") or []
            mode = default_mode
            matched_signal_ids = []
            matched_message_keys = set()

            if mode != "alert":
                mode, matched_signal_ids, matched_message_keys = _classify_thread_entrypoint(
                    messages,
                    bot_user_id,
                    bot_app_id,
                )

            transcript = _format_thread_transcript(
                messages,
                bot_user_id,
                matched_message_keys,
                bot_app_id,
            )
            logger.info(
                "Slack ingress mode=%s source=%s matched_signals=%s fetched_messages=%s rendered_transcript=%s",
                mode,
                "latest-request" if default_mode == "alert" else "thread",
                ",".join(matched_signal_ids) or "none",
                len(messages),
                bool(transcript),
            )
            return _build_prefixed_prompt(latest_request, mode, transcript or None)
        except SlackApiError as error:
            logger.warning("Failed to read Slack thread history: %s", error)
            return _build_prefixed_prompt(latest_request, default_mode)


    def handle_app_mention_events(body, client: WebClient, logger: Logger):
        event = body.get("event", {}) or {}
        if event.get("subtype") == "bot_message":
            return

        channel_id = event["channel"]
        text = _strip_bot_mentions(event.get("text") or "")
        if not text:
            return
        prompt_text = build_thread_aware_prompt(text, body, logger)

        thread_ts = event.get("thread_ts") or event["ts"]
        team_id = body.get("team_id")
        cache_key = _thread_key(team_id, channel_id, thread_ts)
        context_id = THREAD_CONTEXTS.get(cache_key)
        agent_url = os.getenv("KAGENT_A2A_URL")

        if not agent_url:
            client.chat_postMessage(
                channel=channel_id,
                thread_ts=thread_ts,
                text="KAGENT_A2A_URL is not configured for the Slack bot.",
            )
            return

        placeholder = client.chat_postMessage(
            channel=channel_id,
            thread_ts=thread_ts,
            text=placeholder_text_for_prompt(text),
        )

        try:
            response, usage_info, next_context_id = run_a2a(
                agent_url,
                prompt_text,
                logger,
                context_id=context_id,
            )
            if next_context_id:
                THREAD_CONTEXTS[cache_key] = next_context_id
            if not response:
                response = "No response received from the agent."

            blocks = [
                {
                    "type": "section",
                    "text": {
                        "type": "mrkdwn",
                        "text": response[:2900]
                    }
                }
            ]

            if usage_info and SHOW_USAGE:
                blocks.extend(
                    [
                        {"type": "divider"},
                        {
                            "type": "context",
                            "elements": [{"type": "mrkdwn", "text": usage_info}],
                        },
                    ]
                )

            client.chat_update(
                channel=channel_id,
                ts=placeholder["ts"],
                blocks=blocks,
                text=response[:200],
            )
        except Exception as error:
            logger.exception("Failed to handle app mention")
            client.chat_update(
                channel=channel_id,
                ts=placeholder["ts"],
                text=f"@mention failed: {error}",
            )


    def register_handlers(app: App):
        app.command("/kind-kagent")(kind_kagent_command)
        app.command("/kind-shadow")(kind_shadow_command)
        app.event("app_mention")(handle_app_mention_events)
