apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: investigation-agent
  namespace: kagent
spec:
  description: Read-only Kubernetes investigation assistant.
  type: Declarative
  declarative:
    modelConfig: investigation-model-config
    stream: true
    systemMessageFrom:
      type: ConfigMap
      name: investigation-skill
      key: system-message
    tools:
      - type: McpServer
        mcpServer:
          name: kagent-tool-server
          kind: RemoteMCPServer
          toolNames:
            - k8s_get_resources
            - k8s_describe_resource
            - k8s_get_pod_logs
            - k8s_get_available_api_resources
      - type: McpServer
        mcpServer:
          name: investigation-mcp-server
          kind: RemoteMCPServer
          toolNames:
            - build_investigation_report
            - normalize_alert_input
            - find_unhealthy_pod
            - find_unhealthy_workloads
            - collect_node_context
            - collect_service_context
            - collect_workload_context
            - collect_alert_context
            - build_root_cause_report
            - collect_correlated_changes
    a2aConfig:
      skills:
        - id: investigate-workload
          name: Kubernetes Investigation
          description: Investigate unhealthy workloads and summarize likely causes.
          inputModes: ["text"]
          outputModes: ["text"]
          tags: ["kubernetes", "investigation"]
          examples:
            - "Investigate the unhealthy pod in namespace kagent-smoke."
            - "Why is crashy failing?"
            - "Summarize diagnosis, evidence, and recommendation for pod/crashy."
            - "Investigate Backend/crashy in namespace operator-smoke."
            - "Investigate Frontend/landing in namespace operator-smoke for high latency."
            - "Investigate Cluster/testapp in namespace operator-smoke."
