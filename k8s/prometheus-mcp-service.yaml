apiVersion: v1
kind: Service
metadata:
  name: prometheus-mcp-server
  namespace: kagent
  labels:
    app.kubernetes.io/name: prometheus-mcp-server
spec:
  selector:
    app.kubernetes.io/name: prometheus-mcp-server
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: metrics
      port: 9091
      targetPort: metrics
