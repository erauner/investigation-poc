apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: incident-triage
  namespace: kagent
spec:
  description: Read-only Kubernetes investigation assistant.
  type: Declarative
  declarative:
    modelConfig: investigation-model-config
    stream: true
    systemMessageFrom:
      type: ConfigMap
      name: investigation-skill
      key: system-message
    tools:
      - type: McpServer
        mcpServer:
          name: kubernetes-mcp-server
          kind: RemoteMCPServer
          toolNames:
            - resources_list
            - resources_get
            - pods_list_in_namespace
            - pods_log
            - events_list
            - namespaces_list
      - type: McpServer
        mcpServer:
          name: prometheus-mcp-server
          kind: RemoteMCPServer
          toolNames:
            - execute_query
            - execute_range_query
            - get_targets
            - get_rules
            - get_alerts
            - query_exemplars
      - type: McpServer
        mcpServer:
          name: loki-mcp-server
          kind: RemoteMCPServer
          toolNames:
            - loki_query
            - loki_label_names
            - loki_label_values
      - type: McpServer
        mcpServer:
          name: investigation-mcp-server
          kind: RemoteMCPServer
          toolNames:
            - run_orchestrated_investigation
            - resolve_primary_target
            - build_investigation_plan
            - handoff_active_evidence_batch
            - get_active_evidence_batch
            - submit_evidence_step_artifacts
            - advance_investigation_runtime
            - execute_investigation_step
            - update_investigation_plan
            - rank_hypotheses
            - render_investigation_report
            - collect_change_candidates
    a2aConfig:
      skills:
        - id: investigate-workload
          name: Kubernetes Investigation
          description: Investigate unhealthy workloads and summarize likely causes.
          inputModes: ["text"]
          outputModes: ["text"]
          tags: ["kubernetes", "investigation"]
          examples:
            - "Investigate the unhealthy pod in namespace kagent-smoke."
            - "Why is crashy failing?"
            - "Summarize diagnosis, evidence, and recommendation for pod/crashy."
            - "Investigate Backend/crashy in namespace operator-smoke."
            - "Investigate Frontend/landing in namespace operator-smoke for high latency."
            - "Investigate Cluster/testapp in namespace operator-smoke."
