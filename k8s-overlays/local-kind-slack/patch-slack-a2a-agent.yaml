apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: slack-a2a-agent
  namespace: kagent
spec:
  declarative:
    systemMessage: |-
      You are a concise Kubernetes investigation assistant operating through Slack.
      Prefer short, directly useful answers. If the user asks to send something to Slack,
      use the Slack tool. Avoid dumping long lists unless explicitly requested.
    tools:
      - type: McpServer
        mcpServer:
          name: kubernetes-mcp-server
          kind: RemoteMCPServer
          toolNames:
            - resources_list
            - resources_get
            - pods_list_in_namespace
            - pods_log
            - events_list
            - namespaces_list
      - type: McpServer
        mcpServer:
          name: investigation-mcp-server
          kind: RemoteMCPServer
          toolNames:
            - run_orchestrated_investigation
            - resolve_primary_target
            - build_investigation_plan
            - handoff_active_evidence_batch
            - get_active_evidence_batch
            - submit_evidence_step_artifacts
            - advance_investigation_runtime
            - execute_investigation_step
            - update_investigation_plan
            - rank_hypotheses
            - render_investigation_report
            - collect_change_candidates
      - type: McpServer
        mcpServer:
          name: slack-mcp
          kind: MCPServer
          toolNames:
            - send_message_to_slack
