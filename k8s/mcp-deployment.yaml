apiVersion: apps/v1
kind: Deployment
metadata:
  name: investigation-mcp-server
  namespace: kagent
  labels:
    app.kubernetes.io/name: investigation-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: investigation-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: investigation-mcp-server
    spec:
      serviceAccountName: investigation-service
      containers:
        - name: mcp
          image: ghcr.io/erauner/investigation-poc:latest
          imagePullPolicy: Always
          command: ["python", "-m", "investigation_service.mcp_server"]
          env:
            - name: GUIDELINES_PATH
              value: /etc/investigation-service/guidelines.yaml
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: "8001"
            - name: MCP_PATH
              value: "/mcp"
          envFrom:
            - configMapRef:
                name: investigation-service-config
          volumeMounts:
            - name: guidelines
              mountPath: /etc/investigation-service
              readOnly: true
          ports:
            - name: mcp
              containerPort: 8001
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: guidelines
          configMap:
            name: investigation-service-guidelines
